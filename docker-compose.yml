version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      - NEO4J_AUTH=neo4j/cascadeshield
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2
    ports: ["8086:8086"]
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=cascadeshield
      - DOCKER_INFLUXDB_INIT_ORG=cascadeshield
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
    volumes:
      - influx_data:/var/lib/influxdb2

volumes:
  neo4j_data:
  influx_data:
